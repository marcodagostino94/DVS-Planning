<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>DVS Planning — v_10_CORREZIONI ULTIME</title>
  <meta name="theme-color" content="#e8eaed">
  <link rel="stylesheet" href="./src/styles.css?v=10.0">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="./assets/logos/digital-video-full.png" alt="Digital Video">
      </div>

      <nav class="sidebar-nav" aria-label="Navigazione principale">
        <button class="nav-item active" data-view="planning" type="button">
          <span class="nav-icon">▦</span><span>Planning</span>
        </button>
        <button class="nav-item" data-view="editors" type="button">
          <span class="nav-icon">◉</span><span>Dipendenti</span>
        </button>
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">≡</span><span>Riepiloghi</span>
        </button>
      </nav>

      <section class="online-panel" aria-label="Utenti collegati">
        <div class="online-title">
          <span class="presence-dot"></span>
          <span>Utenti collegati</span>
        </div>
        <div class="online-users">
          <span class="online-avatar" title="Marco D'Agostino">MD</span>
          <span class="online-avatar" title="Segreteria">SG</span>
          <span class="online-avatar" title="Responsabile HR">HR</span>
        </div>
        <div class="online-count">3 online</div>
      </section>

      <div class="sidebar-footer">
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">⚙</span><span>Impostazioni</span>
        </button>
        <span class="build-pill">v_10 CORREZIONI ULTIME</span>
      </div>
    </aside>

    <main class="main-area">
      <section id="planningView" class="app-view active">
        <header class="topbar">
          <div class="page-title">
            <h1>Planning sale</h1>
            <p>Turni giornalieri · Sale 1–15</p>
          </div>

          <div class="toolbar">
            <button id="todayBtn" class="toolbar-btn" type="button">Oggi</button>

            <div class="month-switcher">
              <button id="prevMonth" class="icon-btn" type="button" aria-label="Mese precedente">‹</button>
              <button id="monthLabel" class="month-label" type="button">Luglio 2026</button>
              <button id="nextMonth" class="icon-btn" type="button" aria-label="Mese successivo">›</button>
            </div>

            <div class="zoom-indicator" title="Lo zoom agisce soltanto sul planning">
              <span id="zoomLabel">100%</span>
            </div>

            <button id="newShiftBtn" class="primary-btn" type="button">+ Nuovo turno</button>
          </div>
        </header>

        <section class="planning-frame">
          <div id="planningScroller" class="planning-scroller">
            <div id="planningCanvas" class="planning-canvas">
              <div id="planningGrid" class="planning-grid" aria-label="Planning mensile"></div>
            </div>
          </div>
        </section>
      </section>

      <section id="editorsView" class="app-view">
        <header class="topbar">
          <div class="page-title">
            <h1>Dipendenti</h1>
            <p>Rubrica del personale sincronizzata con Supabase</p>
          </div>
          <button id="newEditorBtn" class="primary-btn" type="button">+ Nuovo dipendente</button>
        </header>

        <section class="editors-page">
          <div class="editors-card">
            <div class="editors-toolbar">
              <input id="editorSearch" type="search" placeholder="Cerca per nome, qualifica, telefono, email o note">
              <select id="editorRoleFilter" class="editor-role-filter" aria-label="Filtra per qualifica">
                <option value="">Tutte le qualifiche</option>
                <option value="Montatore">Montatore</option>
                <option value="Grafico">Grafico</option>
                <option value="Colorist">Colorist</option>
                <option value="Sound">Sound</option>
                <option value="Assistente">Assistente</option>
                <option value="Altro">Altro</option>
              </select>
              <span id="editorsCount" class="count-pill"></span>
            </div>
            <div id="editorsList" class="editors-list"></div>
          </div>
        </section>
      </section>
    </main>
  </div>

  <dialog id="shiftDialog" class="app-dialog shift-dialog-wide">
    <form id="shiftForm">
      <div class="dialog-header">
        <div>
          <span class="dialog-eyebrow">TURNO</span>
          <h2 id="shiftDialogTitle">Nuovo turno</h2>
        </div>
        <button id="closeShiftDialog" class="dialog-close" type="button" aria-label="Chiudi">×</button>
      </div>

      <input id="shiftId" type="hidden">

      <div class="form-grid">
        <label>
          Produzione
          <input id="production" list="productionSuggestions" required placeholder="RAI, CATTLEYA…" autocomplete="off">
          <datalist id="productionSuggestions"></datalist>
        </label>

        <label>
          Film / Programma
          <input id="film" list="filmSuggestions" required placeholder="VITA IN DIRETTA" autocomplete="off">
          <datalist id="filmSuggestions"></datalist>
        </label>

        <fieldset class="date-range-field form-wide">
          <legend>Periodo</legend>
          <button id="dateRangeTrigger" class="date-range-trigger" type="button" aria-expanded="false">
            <span><small>Dal</small><strong id="dateFromDisplay">—</strong></span>
            <span class="date-arrow">→</span>
            <span><small>Al</small><strong id="dateToDisplay">—</strong></span>
          </button>
          <input id="dateFrom" type="hidden" required>
          <input id="dateTo" type="hidden" required>
          <div id="rangeCalendar" class="range-calendar hidden" aria-label="Calendario intervallo">
            <div class="range-calendar-toolbar">
              <button id="rangePrevMonth" type="button" aria-label="Mese precedente">‹</button>
              <strong id="rangeCalendarTitle"></strong>
              <button id="rangeNextMonth" type="button" aria-label="Mese successivo">›</button>
            </div>
            <div class="range-calendar-weekdays"><span>L</span><span>M</span><span>M</span><span>G</span><span>V</span><span>S</span><span>D</span></div>
            <div id="rangeCalendarGrid" class="range-calendar-grid"></div>
            <div class="range-calendar-hint">Seleziona il primo e l’ultimo giorno dell’intervallo.</div>
          </div>
          <div id="weekdayPicker" class="weekday-picker" aria-label="Giorni della settimana">
            <button type="button" data-weekday="all" class="active">T</button>
            <button type="button" data-weekday="1">L</button>
            <button type="button" data-weekday="2">M</button>
            <button type="button" data-weekday="3">M</button>
            <button type="button" data-weekday="4">G</button>
            <button type="button" data-weekday="5">V</button>
            <button type="button" data-weekday="6">S</button>
            <button type="button" data-weekday="0">D</button>
          </div>
        </fieldset>

        <label>
          Dalle
          <input id="start" type="time" required value="10:00">
        </label>

        <label>
          Alle
          <input id="end" type="time" required value="18:00">
        </label>

        <label>
          Sala
          <select id="room" required></select>
        </label>

        <label>
          Lavorazione
          <select id="workType" required>
            <option>EDIT</option>
            <option>ASSISTENTE</option>
            <option>GRAFICA</option>
            <option>COLOR</option>
            <option>SOUND</option>
            <option>REDAZIONE</option>
          </select>
        </label>

        <label class="form-wide">
          Dipendente
          <input id="editorSearchInput" list="editorSuggestions" placeholder="Cerca per nome o cognome" autocomplete="off">
          <datalist id="editorSuggestions"></datalist>
          <input id="editor" type="hidden">
        </label>

        <label class="checkbox-label option-card">
          <input id="isClient" type="checkbox">
          <span><strong>CLIENTE</strong><small>Disabilita la selezione del dipendente</small></span>
        </label>

        <label class="checkbox-label option-card">
          <input id="isDoubleStation" type="checkbox">
          <span><strong>DOPPIA POSTAZIONE</strong><small>Mostra la dicitura rossa nel turno</small></span>
        </label>

        <fieldset class="status-field form-wide">
          <legend>Stato</legend>
          <div class="segmented-control">
            <button type="button" data-status="definitivo" class="active">Definitivo</button>
            <button type="button" data-status="provvisorio">Provvisorio</button>
          </div>
          <input id="status" type="hidden" value="definitivo">
        </fieldset>

        <label id="colorField" class="form-wide">
          Colore turno
          <select id="color" required></select>
        </label>
      </div>

      <div id="shiftFormError" class="form-error" role="alert"></div>

      <div class="dialog-actions">
        <button id="deleteShiftBtn" class="danger-btn hidden" type="button">Elimina turno</button>
        <div class="dialog-spacer"></div>
        <button id="cancelShiftBtn" class="secondary-btn" type="button">Annulla</button>
        <button class="primary-btn" type="submit">Salva turno</button>
      </div>
    </form>
  </dialog>

  <dialog id="editorDialog" class="app-dialog editor-dialog">
    <form id="editorForm">
      <div class="dialog-header">
        <div>
          <span class="dialog-eyebrow">DIPENDENTE</span>
          <h2 id="editorDialogTitle">Nuovo dipendente</h2>
        </div>
        <button id="closeEditorDialog" class="dialog-close" type="button" aria-label="Chiudi">×</button>
      </div>

      <input id="editorId" type="hidden">

      <div class="form-grid">
        <label>
          Nome
          <input id="editorFirstName" required placeholder="Nome" autocomplete="given-name">
        </label>
        <label>
          Cognome
          <input id="editorLastName" required placeholder="Cognome" autocomplete="family-name">
        </label>
        <label>
          Qualifica
          <select id="editorRole" required>
            <option value="Montatore">Montatore</option>
            <option value="Grafico">Grafico</option>
            <option value="Colorist">Colorist</option>
            <option value="Sound">Sound</option>
            <option value="Assistente">Assistente</option>
            <option value="Altro">Altro</option>
          </select>
        </label>
        <label>
          Telefono
          <input id="editorPhone" type="tel" placeholder="333 1234567" autocomplete="tel">
        </label>
        <label class="form-wide">
          Email
          <input id="editorEmail" type="email" placeholder="nome@azienda.it" autocomplete="email">
        </label>
        <label class="form-wide">
          Note
          <textarea id="editorNotes" rows="4" placeholder="Aggiungi liberamente informazioni utili…"></textarea>
        </label>
      </div>

      <div id="editorFormError" class="form-error" role="alert"></div>

      <div class="dialog-actions">
        <button id="deleteEditorBtn" class="danger-btn hidden" type="button">Elimina</button>
        <div class="dialog-spacer"></div>
        <button id="cancelEditorBtn" class="secondary-btn" type="button">Annulla</button>
        <button class="primary-btn" type="submit">Salva dipendente</button>
      </div>
    </form>
  </dialog>

  <div id="selectionBadge" class="selection-badge hidden" aria-live="polite"></div>

  <div id="contextMenu" class="context-menu hidden" role="menu" aria-label="Azioni turno">
    <button type="button" data-action="edit">Modifica turno</button>
    <button type="button" data-action="confirm">Conferma turno</button>
    <button type="button" data-action="unconfirm">Annulla conferma</button>
    <div class="context-separator"></div>
    <button type="button" data-action="copy">Copia</button>
    <button type="button" data-action="cut">Taglia</button>
    <button type="button" data-action="paste">Incolla</button>
    <div class="context-separator"></div>
    <button type="button" data-action="make-definitive">Rendi definitivo</button>
    <button type="button" data-action="make-provisional">Rendi provvisorio</button>
    <div class="context-separator"></div>
    <button type="button" class="danger-action" data-action="delete">Elimina</button>
  </div>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./src/config.js?v=10.0"></script>
  <script src="./src/app.js?v=10.0"></script>
</body>
</html>
