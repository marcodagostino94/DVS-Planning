<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DVS Planning — Build 3.0</title>
  <meta name="theme-color" content="#f4f5f7">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="./assets/logos/digital-video-full.png" alt="Digital Video">
      </div>

      <nav class="sidebar-nav" aria-label="Navigazione principale">
        <button class="nav-item active" type="button">
          <span class="nav-icon">▦</span><span>Planning</span>
        </button>
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">◉</span><span>Montatori</span>
        </button>
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">▤</span><span>Film</span>
        </button>
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">≡</span><span>Riepiloghi</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item" type="button" disabled>
          <span class="nav-icon">⚙</span><span>Impostazioni</span>
        </button>
        <div class="build-pill">Build 3.0</div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="page-title">
          <h1>Planning sale</h1>
          <p>Turni giornalieri · Sale 1–15</p>
        </div>

        <div class="toolbar">
          <button id="todayBtn" class="toolbar-btn" type="button">Oggi</button>
          <div class="month-switcher">
            <button id="prevMonth" class="icon-btn" type="button" aria-label="Mese precedente">‹</button>
            <button id="monthLabel" class="month-label" type="button">Luglio 2026</button>
            <button id="nextMonth" class="icon-btn" type="button" aria-label="Mese successivo">›</button>
          </div>
          <button id="newShiftBtn" class="primary-btn" type="button">+ Nuovo turno</button>
        </div>
      </header>

      <section class="planning-frame">
        <div id="planningScroller" class="planning-scroller">
          <div id="planningGrid" class="planning-grid" aria-label="Planning mensile"></div>
        </div>
      </section>
    </main>
  </div>

  <dialog id="shiftDialog" class="shift-dialog">
    <form id="shiftForm">
      <div class="dialog-header">
        <div>
          <span class="dialog-eyebrow">TURNO</span>
          <h2 id="dialogTitle">Nuovo turno</h2>
        </div>
        <button id="closeDialog" class="dialog-close" type="button" aria-label="Chiudi">×</button>
      </div>

      <input id="shiftId" type="hidden">

      <div class="form-grid">
        <label>
          Produzione
          <input id="production" required placeholder="RAI, CATTLEYA…">
        </label>

        <label>
          Film / Programma
          <input id="film" required placeholder="VITA IN DIRETTA">
        </label>

        <label>
          Data
          <input id="date" type="date" required>
        </label>

        <label>
          Sala
          <select id="room" required></select>
        </label>

        <label>
          Dalle
          <input id="start" type="time" required value="08:00">
        </label>

        <label>
          Alle
          <input id="end" type="time" required value="16:00">
        </label>

        <label>
          Lavorazione
          <select id="workType" required>
            <option>EDIT</option>
            <option>ASSISTENTE</option>
            <option>GRAFICA</option>
            <option>COLOR</option>
            <option>SOUND DESIGN</option>
          </select>
        </label>

        <label>
          Montatore
          <input id="editor" placeholder="Lascia vuoto se provvisorio">
        </label>

        <label>
          Stato
          <select id="status" required>
            <option value="definitivo">Definitivo</option>
            <option value="provvisorio">Provvisorio</option>
          </select>
        </label>

        <label>
          Colore film
          <select id="color" required></select>
        </label>
      </div>

      <div id="formError" class="form-error" role="alert"></div>

      <div class="dialog-actions">
        <button id="deleteShiftBtn" class="danger-btn hidden" type="button">Elimina</button>
        <div class="dialog-spacer"></div>
        <button id="cancelDialogBtn" class="secondary-btn" type="button">Annulla</button>
        <button class="primary-btn" type="submit">Salva turno</button>
      </div>
    </form>
  </dialog>

  <script src="./src/app.js"></script>
</body>
</html>
